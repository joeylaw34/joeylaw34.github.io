<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Joe's Training">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Joe's Training</title>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --bg4: #2e2e2e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --text2: #a0a0a0;
  --text3: #666;
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.15);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.15);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,0.15);
  --teal: #14b8a6;
  --teal-dim: rgba(20,184,166,0.15);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }

/* NAV */
#nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(60px + var(--safe-bottom)); background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: var(--safe-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; color: var(--text3); cursor: pointer; padding-top: 8px; transition: color .15s; border: none; background: none; }
.nav-btn.active { color: var(--blue); }
.nav-icon { font-size: 20px; line-height: 1; }

/* SCREENS */
.screen { position: fixed; top: 0; left: 0; right: 0; bottom: 60px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; padding-bottom: calc(20px + var(--safe-bottom)); }
.screen.active { display: block; }
.screen-header { padding: calc(var(--safe-top) + 16px) 16px 12px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
.screen-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.screen-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* TODAY SCREEN */
.today-hero { margin: 12px 16px 0; background: linear-gradient(135deg, #1e3a5f, #0f2040); border-radius: var(--radius); padding: 18px; border: 1px solid rgba(59,130,246,0.3); }
.today-date { font-size: 12px; color: var(--blue); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.today-title { font-size: 22px; font-weight: 700; margin-top: 4px; letter-spacing: -0.4px; }
.today-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.today-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.pill-blue { background: var(--blue-dim); color: var(--blue); }
.pill-green { background: var(--green-dim); color: var(--green); }
.pill-amber { background: var(--amber-dim); color: var(--amber); }
.pill-red { background: var(--red-dim); color: var(--red); }
.pill-purple { background: var(--purple-dim); color: var(--purple); }
.pill-pink { background: var(--pink-dim); color: var(--pink); }
.pill-teal { background: var(--teal-dim); color: var(--teal); }

.section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; padding: 16px 16px 6px; }

.card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); margin: 0 16px 10px; overflow: hidden; }
.card-tap { cursor: pointer; transition: background .15s; }
.card-tap:active { background: var(--bg3); }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0 16px 10px; }
.stat-card { background: var(--bg2); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px; }
.stat-label { font-size: 11px; color: var(--text3); font-weight: 500; }
.stat-val { font-size: 22px; font-weight: 700; margin-top: 2px; letter-spacing: -0.5px; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

/* WORKOUT DETAIL */
.ex-list { padding: 0; }
.ex-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
.ex-item:last-child { border-bottom: none; }
.ex-name { font-size: 14px; color: var(--text); flex: 1; line-height: 1.3; }
.ex-sets { font-size: 13px; color: var(--blue); font-weight: 600; white-space: nowrap; }

.note-card { background: var(--bg3); border-radius: var(--radius-sm); margin: 10px 16px; padding: 12px 14px; border-left: 3px solid var(--amber); }
.note-card p { font-size: 13px; color: var(--text2); line-height: 1.6; }
.note-card strong { color: var(--text); font-weight: 600; }

.nutr-grid { display: grid; grid-template-columns: 1fr 1fr; }
.nutr-item { padding: 10px 16px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.nutr-item:nth-child(even) { border-right: none; }
.nutr-item:nth-last-child(-n+2) { border-bottom: none; }
.nutr-label { font-size: 11px; color: var(--text3); font-weight: 500; }
.nutr-val { font-size: 15px; font-weight: 700; margin-top: 2px; }

/* CALENDAR SCREEN */
.month-tabs { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; scrollbar-width: none; }
.month-tabs::-webkit-scrollbar { display: none; }
.mtab { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); color: var(--text2); white-space: nowrap; background: transparent; transition: all .15s; }
.mtab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

.week-section { margin: 0 16px 4px; }
.week-header { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; padding: 10px 0 4px; }
.day-row { background: var(--bg2); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 6px; display: flex; align-items: center; padding: 10px 14px; gap: 12px; cursor: pointer; transition: background .15s; }
.day-row:active { background: var(--bg3); }
.day-date-col { width: 36px; text-align: center; flex-shrink: 0; }
.day-num { font-size: 18px; font-weight: 700; line-height: 1; }
.day-dow2 { font-size: 10px; color: var(--text3); font-weight: 500; text-transform: uppercase; margin-top: 1px; }
.day-info { flex: 1; min-width: 0; }
.day-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-desc { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-chevron { color: var(--text3); font-size: 16px; flex-shrink: 0; }

/* PHASE SCREEN */
.phase-card { margin: 0 16px 10px; background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; }
.phase-head { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.phase-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.phase-info h3 { font-size: 15px; font-weight: 700; }
.phase-info p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.phase-dates { font-size: 11px; font-weight: 600; margin-top: 4px; }
.phase-body { padding: 0 16px 14px; display: none; }
.phase-body.open { display: block; }
.phase-goals { margin-top: 0; }
.goal-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.goal-item:last-child { border-bottom: none; }
.goal-bullet { color: var(--text3); flex-shrink: 0; margin-top: 1px; }

/* METRICS SCREEN */
.metrics-card { margin: 0 16px 10px; }
.progress-bar-wrap { background: var(--bg3); border-radius: 4px; height: 6px; margin-top: 6px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 4px; transition: width .6s ease; }

/* DAY DETAIL MODAL */
#day-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; display: none; flex-direction: column; background: var(--bg); }
#day-modal.open { display: flex; }
.modal-header { padding: calc(var(--safe-top) + 16px) 16px 12px; display: flex; align-items: flex-start; gap: 12px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
.modal-back { background: var(--bg3); border: none; color: var(--text); font-size: 15px; padding: 6px 12px; border-radius: var(--radius-xs); cursor: pointer; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.modal-title { flex: 1; }
.modal-title h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.modal-title p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.modal-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(20px + var(--safe-bottom)); }

.modal-section { padding: 14px 16px 4px; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }

/* FAST DAYS */
.fast-day { background: linear-gradient(135deg, #2a1810, #1a0e08); border: 1px solid rgba(239,68,68,0.25); }
.fast-day .today-date { color: var(--red); }
.refeed-day { background: linear-gradient(135deg, #0d2818, #071a0e); border: 1px solid rgba(34,197,94,0.25); }
.refeed-day .today-date { color: var(--green); }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.screen.active { animation: fadeIn .2s ease; }
</style>
</head>
<body>

<!-- SCREENS -->
<div id="screen-today" class="screen active">
  <div class="screen-header">
    <h1>Today</h1>
    <p id="today-date-label"></p>
  </div>
  <div id="today-content"></div>
</div>

<div id="screen-calendar" class="screen">
  <div class="screen-header">
    <h1>Calendar</h1>
    <p>Day-by-day plan</p>
  </div>
  <div style="padding-top:12px">
    <div class="month-tabs">
      <button class="mtab active" onclick="showMonth('april',this)">April 2026</button>
      <button class="mtab" onclick="showMonth('may',this)">May 2026</button>
    </div>
    <div id="calendar-body"></div>
  </div>
</div>

<div id="screen-phases" class="screen">
  <div class="screen-header">
    <h1>Program</h1>
    <p>Full 2026–2027 strategy</p>
  </div>
  <div id="phases-body" style="padding-top:12px"></div>
</div>

<div id="screen-metrics" class="screen">
  <div class="screen-header">
    <h1>Goals</h1>
    <p>Targets &amp; progress</p>
  </div>
  <div id="metrics-body" style="padding-top:12px"></div>
</div>

<!-- DAY DETAIL MODAL -->
<div id="day-modal">
  <div class="modal-header">
    <button class="modal-back" onclick="closeModal()">← Back</button>
    <div class="modal-title">
      <h2 id="modal-title"></h2>
      <p id="modal-subtitle"></p>
    </div>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<!-- NAV -->
<div id="nav">
  <button class="nav-btn active" onclick="switchScreen('today',this)">
    <span class="nav-icon">⚡</span>Today
  </button>
  <button class="nav-btn" onclick="switchScreen('calendar',this)">
    <span class="nav-icon">📅</span>Calendar
  </button>
  <button class="nav-btn" onclick="switchScreen('phases',this)">
    <span class="nav-icon">🗺</span>Program
  </button>
  <button class="nav-btn" onclick="switchScreen('metrics',this)">
    <span class="nav-icon">🎯</span>Goals
  </button>
</div>

<script src="data.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
<script>
// NAV
function switchScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  btn.classList.add('active');
}

// TODAY
function renderToday() {
  const now = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('today-date-label').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

  // Find today's day in data
  const allDays = [...(DAYS.april || []), ...(DAYS.may || [])];
  const todayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const dayData = allDays.find(d => d.key === todayKey);

  const container = document.getElementById('today-content');
  if (!dayData) {
    // Show nearest upcoming day
    const upcoming = allDays.find(d => d.key >= todayKey);
    container.innerHTML = renderTodayHero(upcoming || allDays[0], true) + renderQuickStats() + renderUpcomingStrip(allDays, todayKey);
  } else {
    container.innerHTML = renderTodayHero(dayData, false) + renderQuickStats() + renderTodayWorkoutPreview(dayData);
  }
}

function renderTodayHero(d, isUpcoming) {
  if (!d) return '';
  const tagClass = getTagClass(d.tag);
  const heroClass = d.tag === 'fast' ? 'fast-day' : d.tag === 'refeed' ? 'refeed-day' : '';
  return `<div class="today-hero ${heroClass}" onclick="openDay(${JSON.stringify(d).replace(/"/g,'&quot;')})">
    <div class="today-date">${isUpcoming ? 'NEXT · ' : ''}${d.date} · ${d.dow}</div>
    <div class="today-title">${d.summary}</div>
    <div class="today-sub">${d.weekLabel || ''}</div>
    <div class="today-tags">
      <span class="pill pill-${tagClass}">${d.tagLabel}</span>
      ${d.extraTags ? d.extraTags.map(t => `<span class="pill pill-${t.cls}">${t.label}</span>`).join('') : ''}
    </div>
  </div>`;
}

function renderQuickStats() {
  return `<div class="section-label">Current targets</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Current weight</div><div class="stat-val" style="color:var(--blue)">216 lbs</div><div class="stat-sub">Target: 200 lbs</div></div>
    <div class="stat-card"><div class="stat-label">Bench press</div><div class="stat-val" style="color:var(--green)">205×3</div><div class="stat-sub">Target: 225×1</div></div>
    <div class="stat-card"><div class="stat-label">5K pace</div><div class="stat-val" style="color:var(--amber)">10:15</div><div class="stat-sub">Target: sub-8:03</div></div>
    <div class="stat-card"><div class="stat-label">Phase</div><div class="stat-val" style="color:var(--purple);font-size:15px">Phase 1</div><div class="stat-sub">Cut + strength</div></div>
  </div>`;
}

function renderTodayWorkoutPreview(d) {
  if (!d.detail) return '';
  const firstBlock = d.detail.left && d.detail.left[0];
  if (!firstBlock) return '';
  return `<div class="section-label">Today's workout</div>
  <div class="card card-tap" onclick="openDay(${JSON.stringify(d).replace(/"/g,'&quot;')})">
    <div style="padding:12px 16px 4px;font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${firstBlock.h}</div>
    <div class="ex-list">${firstBlock.rows.slice(0,5).map(r => `<div class="ex-item"><span class="ex-name">${r.n}</span><span class="ex-sets">${r.s || r.v || ''}</span></div>`).join('')}</div>
    ${firstBlock.rows.length > 5 ? `<div style="padding:10px 16px;font-size:12px;color:var(--text3)">+ ${firstBlock.rows.length - 5} more — tap to see full plan</div>` : ''}
  </div>`;
}

function renderUpcomingStrip(allDays, todayKey) {
  const upcoming = allDays.filter(d => d.key >= todayKey).slice(0,3);
  if (!upcoming.length) return '';
  return `<div class="section-label">Coming up</div>` +
    upcoming.map(d => `<div class="card card-tap" onclick="openDay(${JSON.stringify(d).replace(/"/g,'&quot;')})" style="margin-bottom:8px">
      <div class="day-row" style="margin:0;background:transparent;border:none">
        <div class="day-date-col"><div class="day-num">${d.dateNum}</div><div class="day-dow2">${d.dow.slice(0,3)}</div></div>
        <div class="day-info"><div class="day-title">${d.summary}</div><div class="day-desc">${d.tagLabel}</div></div>
        <div class="day-chevron">›</div>
      </div></div>`).join('');
}

// CALENDAR
function showMonth(month, btn) {
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const days = DAYS[month] || [];
  const weeks = {};
  days.forEach(d => {
    const wk = d.week || 'Week';
    if (!weeks[wk]) weeks[wk] = [];
    weeks[wk].push(d);
  });
  let html = '';
  Object.entries(weeks).forEach(([wk, wkDays]) => {
    html += `<div class="week-section"><div class="week-header">${wk}</div>`;
    wkDays.forEach(d => {
      const tagCls = getTagClass(d.tag);
      html += `<div class="day-row" onclick="openDay(${JSON.stringify(d).replace(/"/g,'&quot;')})">
        <div class="day-date-col"><div class="day-num" style="color:var(--${tagCls})">${d.dateNum}</div><div class="day-dow2">${d.dow.slice(0,3)}</div></div>
        <div class="day-info"><div class="day-title">${d.summary}</div><div class="day-desc"><span style="color:var(--${tagCls})">${d.tagLabel}</span> · ${d.weekLabel || ''}</div></div>
        <div class="day-chevron">›</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('calendar-body').innerHTML = html;
}

// PHASES
function renderPhases() {
  let html = '';
  PHASES.forEach((p, i) => {
    html += `<div class="phase-card" onclick="togglePhase(${i})">
      <div class="phase-head">
        <div class="phase-icon" style="background:${p.iconBg}">${p.icon}</div>
        <div class="phase-info">
          <h3>${p.title}</h3>
          <p>${p.dates}</p>
          <div class="phase-dates" style="color:${p.color}">${p.status}</div>
        </div>
      </div>
      <div class="phase-body" id="phase-${i}">
        <div class="phase-goals">${p.goals.map(g => `<div class="goal-item"><span class="goal-bullet">·</span><span>${g}</span></div>`).join('')}</div>
      </div>
    </div>`;
  });
  document.getElementById('phases-body').innerHTML = html;
}

function togglePhase(i) {
  const el = document.getElementById('phase-' + i);
  el.classList.toggle('open');
}

// METRICS
function renderMetrics() {
  let html = '';
  METRICS.forEach(section => {
    html += `<div class="section-label">${section.title}</div>`;
    section.items.forEach(item => {
      const pct = Math.min(100, Math.round((item.current / item.target) * 100));
      html += `<div class="card metrics-card" style="padding:14px 16px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span style="font-size:14px;font-weight:600">${item.label}</span>
          <span style="font-size:12px;color:var(--text3)">${item.targetLabel}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:6px">
          <span style="font-size:24px;font-weight:700;color:var(--${item.color})">${item.currentLabel}</span>
          <span style="font-size:12px;color:var(--text2)">${pct}% there</span>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:var(--${item.color})"></div></div>
        ${item.note ? `<div style="font-size:12px;color:var(--text3);margin-top:6px">${item.note}</div>` : ''}
      </div>`;
    });
  });
  document.getElementById('metrics-body').innerHTML = html;
}

// MODAL
function openDay(d) {
  document.getElementById('modal-title').textContent = d.date + ' — ' + d.dow;
  document.getElementById('modal-subtitle').textContent = d.summary;
  const tagCls = getTagClass(d.tag);
  let html = `<div style="padding:12px 16px 4px"><span class="pill pill-${tagCls}">${d.tagLabel}</span>${d.extraTags ? d.extraTags.map(t=>`<span class="pill pill-${t.cls}" style="margin-left:6px">${t.label}</span>`).join('') : ''}</div>`;

  if (d.detail) {
    const det = d.detail;
    if (det.left) {
      det.left.forEach(col => {
        html += `<div class="modal-section">${col.h}</div><div class="card" style="margin:0 16px 10px">`;
        col.rows.forEach(r => {
          if (r.v !== undefined) {
            html += `<div class="ex-item"><span class="ex-name" style="color:var(--text2)">${r.n}</span><span class="ex-sets" style="color:var(--text)">${r.v}</span></div>`;
          } else {
            html += `<div class="ex-item"><span class="ex-name">${r.n}</span><span class="ex-sets">${r.s}</span></div>`;
          }
        });
        html += '</div>';
      });
    }
    if (det.right) {
      det.right.forEach(col => {
        html += `<div class="modal-section">${col.h}</div><div class="card" style="margin:0 16px 10px">`;
        col.rows.forEach(r => {
          if (r.v !== undefined) {
            html += `<div class="ex-item"><span class="ex-name" style="color:var(--text2)">${r.n}</span><span class="ex-sets" style="color:var(--text)">${r.v}</span></div>`;
          } else {
            html += `<div class="ex-item"><span class="ex-name">${r.n}</span><span class="ex-sets">${r.s}</span></div>`;
          }
        });
        html += '</div>';
      });
    }
    if (det.note) {
      html += `<div class="note-card"><p>${det.note}</p></div>`;
    }
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-body').scrollTop = 0;
  document.getElementById('day-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('day-modal').classList.remove('open');
}

function getTagClass(tag) {
  const map = { lift:'blue', run:'purple', rest:'teal', fast:'red', refeed:'green', bag:'pink', active:'teal', 'lift-run':'blue' };
  return map[tag] || 'blue';
}

// INIT
renderToday();
showMonth('april', document.querySelector('.mtab'));
renderPhases();
renderMetrics();
</script>
